<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather Report</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>🌤 Weather Report</h1>
        <p class="subtitle">Live weather for major Indian cities</p>

        <div class="search-bar">
            <input type="text" id="cityInput" placeholder="Search a city..." />
            <button id="searchBtn">Search</button>
        </div>

        <div id="loading" class="loading-text"></div>
        <div id="weatherGrid" class="weather-grid"></div>

        <!-- Chatbot -->
        <div id="chatbot">
            <div id="chatWindow" class="chat-window hidden">
                <div class="chat-header">
                    <span>🤖 Weather Bot</span>
                    <button id="closeChat">✕</button>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="bot-msg">Hi! Ask me anything about the weather. Try: <em>"Which city is hottest?"</em> or <em>"Is it raining anywhere?"</em></div>
                </div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Ask about weather..." />
                    <button id="chatSend">Send</button>
                </div>
            </div>
            <button id="chatToggle">💬</button>
        </div>

        <script src="script.js"></script>
    </body>
</html>
